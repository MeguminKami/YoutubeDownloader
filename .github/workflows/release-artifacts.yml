name: Build Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: YoutubeGrab
  PYTHON_VERSION: "3.12"
  SMOKE_URL: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: x64
            runtime_dir: .runtime/windows-x64
            asset_ext: zip
          - platform: macos
            os: macos-15-intel
            arch: x64
            runtime_dir: .runtime/macos-x64
            asset_ext: zip
          - platform: linux
            os: ubuntu-latest
            arch: x64
            runtime_dir: .runtime/linux-x64
            asset_ext: tar.gz

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Validate release tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v1.2 or v1.2.3. Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install Linux GUI build prerequisites
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Download runtime tools
        shell: bash
        run: |
          python packaging/download_runtime_tools.py \
            --platform "${{ matrix.platform }}" \
            --output-dir "${{ matrix.runtime_dir }}"

      - name: Build release bundle
        shell: bash
        run: |
          python packaging/build_release.py \
            --platform "${{ matrix.platform }}" \
            --runtime-dir "${{ matrix.runtime_dir }}" \
            --version "${GITHUB_REF_NAME}"

      - name: Validate frozen bundle
        shell: pwsh
        run: |
          $maxAttempts = 2
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            python packaging/validate_release.py `
              --platform "${{ matrix.platform }}" `
              --dist-dir "dist" `
              --probe-url "$env:SMOKE_URL"

            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($attempt -eq $maxAttempts) {
              throw "Frozen bundle validation failed after $maxAttempts attempts."
            }

            Start-Sleep -Seconds 10
          }

      - name: Show built artifact layout
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist | Select-Object FullName, Length

      - name: Package Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $artifactBase = "$env:APP_NAME-$env:GITHUB_REF_NAME-${{ matrix.platform }}-${{ matrix.arch }}"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Compress-Archive -Path "dist\$env:APP_NAME" -DestinationPath "release-assets\$artifactBase.zip" -Force

      - name: Package macOS artifact
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          artifact_base="${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p release-assets
          ditto -c -k --keepParent "dist/${APP_NAME}.app" "release-assets/${artifact_base}.zip"

      - name: Package Linux artifact
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          artifact_base="${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p release-assets
          tar -C dist -czf "release-assets/${artifact_base}.tar.gz" "${APP_NAME}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify packaged assets
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-assets/*)
          if [ ${#files[@]} -ne 3 ]; then
            echo "Expected exactly 3 release artifacts, found ${#files[@]}"
            ls -la release-assets || true
            exit 1
          fi

          for file in "${files[@]}"; do
            [ -s "$file" ] || { echo "Artifact is empty: $file"; exit 1; }
            base="$(basename "$file")"
            [[ "$base" == *"-${GITHUB_REF_NAME}-"* ]] || { echo "Version missing from asset name: $base"; exit 1; }
            [[ "$base" == *"-windows-"* || "$base" == *"-macos-"* || "$base" == *"-linux-"* ]] || { echo "Platform missing from asset name: $base"; exit 1; }
          done

          ls -la release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
