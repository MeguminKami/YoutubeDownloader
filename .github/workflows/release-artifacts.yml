name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            verify_path: dist/YoutubeGrab.exe
            package_path: dist/YoutubeGrab.exe
            package_type: file
            archive_ext: zip
          - os: macos-latest
            platform: macos
            verify_path: dist/YoutubeGrab.app
            package_path: dist/YoutubeGrab.app
            package_type: dir
            archive_ext: zip
          - os: ubuntu-latest
            platform: linux
            verify_path: dist/YoutubeGrab/YoutubeGrab
            package_path: dist/YoutubeGrab
            package_type: dir
            archive_ext: zip

    env:
      APP_NAME: YoutubeGrab
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Print JavaScript action runtime compatibility mode
        shell: pwsh
        run: |
          Write-Host "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=$env:FORCE_JAVASCRIPT_ACTIONS_TO_NODE24"
          if ($env:FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 -ne 'true') {
            throw "Node 24 compatibility override is not enabled."
          }

      - name: Checkout source
        uses: actions/checkout@v6

      - name: Validate release tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y. Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux Tk runtime build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          # Update this line to control the bundled yt-dlp version shipped in release artifacts.
          python -m pip install -U --pre "yt-dlp[default]"
          python -m pip install pyinstaller

      - name: Smoke-check imports
        run: |
          python -c "import main; print('import-ok')"

      - name: Install FFmpeg tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $ffmpeg = Get-Command ffmpeg -ErrorAction SilentlyContinue
          $ffprobe = Get-Command ffprobe -ErrorAction SilentlyContinue
          if (-not $ffmpeg -or -not $ffprobe) {
            throw "FFmpeg installation completed, but ffmpeg/ffprobe are not available on PATH."
          }

          Write-Host "ffmpeg: $($ffmpeg.Source)"
          Write-Host "ffprobe: $($ffprobe.Source)"

      - name: Resolve Windows runtime tool inputs
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ytDlpPath = @(
            (Get-Command yt-dlp -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue),
            (Join-Path (python -c "import sysconfig; print(sysconfig.get_path('scripts'))") 'yt-dlp.exe')
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1

          $ffmpegPath = Get-Command ffmpeg -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue
          $ffprobePath = Get-Command ffprobe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue

          if (-not $ytDlpPath) {
            throw "Could not locate yt-dlp executable after dependency install."
          }
          if (-not $ffmpegPath) {
            throw "Could not locate ffmpeg executable after dependency install."
          }
          if (-not $ffprobePath) {
            throw "Could not locate ffprobe executable after dependency install."
          }

          "YTDLP_EXE=$ytDlpPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FFMPEG_EXE=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FFPROBE_EXE=$ffprobePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Resolved runtime tool inputs for onefile packaging."

      - name: Ensure Windows executable icon asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path 'ui/logo.png')) {
            throw "Missing required logo asset: ui/logo.png"
          }

          if (!(Test-Path 'ui/logo.ico')) {
            python -c "from PIL import Image; im = Image.open('ui/logo.png'); im.save('ui/logo.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(256,256)])"
          }

          if (!(Test-Path 'ui/logo.ico')) {
            throw "Unable to prepare Windows executable icon: ui/logo.ico"
          }

          $icon = Get-Item 'ui/logo.ico'
          if ($icon.Length -le 0) {
            throw "Prepared icon is empty: ui/logo.ico"
          }

          Write-Host "Windows executable icon asset ready: ui/logo.ico"

      - name: Build executable with PyInstaller (Windows onefile)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean YoutubeGrab.spec

      - name: Validate onefile packaging inputs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $requiredTools = @($env:YTDLP_EXE, $env:FFMPEG_EXE, $env:FFPROBE_EXE)

          foreach ($toolPath in $requiredTools) {
            if (-not $toolPath -or !(Test-Path $toolPath)) {
              throw "Missing required runtime tool input: $toolPath"
            }
            $item = Get-Item $toolPath
            if ($item.Length -le 0) {
              throw "Runtime tool input is empty: $toolPath"
            }
            $bytes = [System.IO.File]::ReadAllBytes($toolPath)
            if ($bytes.Length -lt 2 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
              throw "Runtime tool input is not a valid Windows executable: $toolPath"
            }
          }

          if (!(Test-Path 'dist/YoutubeGrab.exe')) {
            throw "Onefile executable was not produced."
          }

          Write-Host "Validated onefile packaging inputs and output executable."

      - name: Build executable with PyInstaller (macOS/Linux)
        if: runner.os != 'Windows'
        shell: pwsh
        run: |
          $sep = if ($env:RUNNER_OS -eq 'Windows') { ';' } else { ':' }
          $hiddenImports = @()
          if ($env:RUNNER_OS -eq 'Linux') {
            # Pillow+Tk in frozen Linux builds needs this helper explicitly bundled.
            $hiddenImports += '--hidden-import'
            $hiddenImports += 'PIL._tkinter_finder'
            $hiddenImports += '--hidden-import'
            $hiddenImports += 'PIL.ImageTk'
          }

          python -m PyInstaller --noconfirm --clean --windowed `
            --name "$env:APP_NAME" `
            --add-data "ui/logo.png${sep}ui" `
            @hiddenImports `
            main.py

      - name: Verify executable artifact
        shell: pwsh
        run: |
          $artifactPath = "${{ matrix.verify_path }}"
          if (!(Test-Path $artifactPath)) {
            throw "Expected build output not found: $artifactPath"
          }

          if ($env:RUNNER_OS -eq 'Windows') {
            if ($artifactPath -notlike '*.exe') {
              throw "Windows artifact is not an EXE: $artifactPath"
            }
            $item = Get-Item $artifactPath
            if ($item.Length -le 0) {
              throw "Executable is empty: $artifactPath"
            }
            $bytes = [System.IO.File]::ReadAllBytes($artifactPath)
            if ($bytes.Length -lt 2 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
              throw "Windows executable does not have MZ header: $artifactPath"
            }
          }

          if ($env:RUNNER_OS -eq 'macOS') {
            if ($artifactPath -notlike '*.app') {
              throw "macOS artifact is not an .app bundle: $artifactPath"
            }
            $bundleExecutable = Join-Path $artifactPath "Contents/MacOS/$env:APP_NAME"
            $plist = Join-Path $artifactPath "Contents/Info.plist"
            if (!(Test-Path $bundleExecutable)) {
              throw "Missing macOS app executable: $bundleExecutable"
            }
            if (!(Test-Path $plist)) {
              throw "Missing macOS Info.plist: $plist"
            }
            & chmod +x $bundleExecutable
          }

          if ($env:RUNNER_OS -eq 'Linux') {
            $item = Get-Item $artifactPath
            if ($item.Length -le 0) {
              throw "Linux binary is empty: $artifactPath"
            }
            & chmod +x $artifactPath
            $bytes = [System.IO.File]::ReadAllBytes($artifactPath)
            if ($bytes.Length -lt 4 -or $bytes[0] -ne 0x7F -or $bytes[1] -ne 0x45 -or $bytes[2] -ne 0x4C -or $bytes[3] -ne 0x46) {
              throw "Linux artifact is not an ELF binary: $artifactPath"
            }
          }

          $invalidInstallerExtensions = @('.msi', '.pkg', '.deb', '.rpm')
          foreach ($ext in $invalidInstallerExtensions) {
            if ($artifactPath.ToLower().EndsWith($ext)) {
              throw "Installer output is not allowed: $artifactPath"
            }
          }

          Write-Host "Verified release output: $artifactPath"

      - name: Smoke test executable launch (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "${{ matrix.verify_path }}"
          $process = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 5
          if ($process.HasExited -and $process.ExitCode -ne 0) {
            throw "Windows app exited immediately with code $($process.ExitCode)"
          }
          if (-not $process.HasExited) {
            Stop-Process -Id $process.Id -Force
          }

      - name: Smoke test executable launch (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x "${{ matrix.verify_path }}"
          xvfb-run -a "${{ matrix.verify_path }}" &
          PID=$!
          sleep 5
          if ! kill -0 "$PID" 2>/dev/null; then
            wait "$PID"
            RC=$?
            if [ "$RC" -ne 0 ]; then
              echo "Linux app exited early with code $RC"
              exit 1
            fi
          fi
          kill "$PID" || true

      - name: Verify macOS bundle metadata
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH="${{ matrix.verify_path }}"
          test -d "$APP_PATH"
          test -f "$APP_PATH/Contents/Info.plist"
          test -f "$APP_PATH/Contents/MacOS/${APP_NAME}"
          file "$APP_PATH/Contents/MacOS/${APP_NAME}"

      - name: Package executable artifact
        shell: pwsh
        run: |
          $artifactBase = "$env:APP_NAME-$env:VERSION-${{ matrix.platform }}-x64"
          $stagingRoot = Join-Path $PWD "release-staging"
          $assetRoot = Join-Path $PWD "release-assets"
          $stagingDir = Join-Path $stagingRoot $artifactBase

          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          New-Item -ItemType Directory -Path $assetRoot -Force | Out-Null

          if ("${{ matrix.package_type }}" -eq "dir") {
            Copy-Item "${{ matrix.package_path }}" $stagingDir -Recurse
          } else {
            Copy-Item "${{ matrix.package_path }}" $stagingDir
          }

          $archivePath = Join-Path $assetRoot "$artifactBase.${{ matrix.archive_ext }}"
          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $archivePath -Force

          Write-Host "Packaged artifact: $archivePath"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-${{ matrix.platform }}
          path: release-assets/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Print JavaScript action runtime compatibility mode
        shell: bash
        run: |
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24}"
          [ "${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24}" = "true" ] || { echo "Node 24 compatibility override is not enabled."; exit 1; }

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release assets are present and correctly named
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-assets/*)
          if [ ${#files[@]} -lt 3 ]; then
            echo "Expected at least 3 release files (windows/macos/linux), got ${#files[@]}"
            ls -la release-assets
            exit 1
          fi

          for f in "${files[@]}"; do
            base="$(basename "$f")"
            [[ "$base" == *"-${GITHUB_REF_NAME}-"* ]] || { echo "Version missing from asset name: $base"; exit 1; }
            [[ "$base" == *"-windows-"* || "$base" == *"-macos-"* || "$base" == *"-linux-"* ]] || { echo "Platform missing from asset name: $base"; exit 1; }
            [[ "$base" == *.zip ]] || { echo "Only zip binary bundles are allowed: $base"; exit 1; }
            [[ "$base" != *.msi && "$base" != *.pkg && "$base" != *.deb && "$base" != *.rpm ]] || { echo "Installer output is not allowed: $base"; exit 1; }
            [ -s "$f" ] || { echo "Asset is empty: $base"; exit 1; }
          done

          ls -la release-assets

      - name: Create or update release with executable assets
        # Keep v2: latest stable major available for this action (currently uses node20).
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*.zip

