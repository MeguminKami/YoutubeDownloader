name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            executable_name: YouTubeDownloaderPro.exe
            archive_ext: zip
          - os: macos-latest
            platform: macos
            executable_name: YouTubeDownloaderPro
            archive_ext: tar.gz
          - os: ubuntu-latest
            platform: linux
            executable_name: YouTubeDownloaderPro
            archive_ext: tar.gz

    env:
      APP_NAME: YouTubeDownloaderPro
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux Tk runtime build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Smoke-check imports
        run: |
          python -c "import main; print('import-ok')"

      - name: Build executable with PyInstaller
        shell: pwsh
        run: |
          $sep = if ($env:RUNNER_OS -eq 'Windows') { ';' } else { ':' }
          python -m PyInstaller --noconfirm --clean --windowed `
            --name "$env:APP_NAME" `
            --add-data "ui/logo.png${sep}ui" `
            main.py

      - name: Verify executable artifact
        shell: pwsh
        run: |
          $binaryPath = Join-Path "dist" "${{ matrix.executable_name }}"
          if (!(Test-Path $binaryPath)) {
            throw "Expected executable not found: $binaryPath"
          }
          $item = Get-Item $binaryPath
          if ($item.Length -le 0) {
            throw "Executable is empty: $binaryPath"
          }
          if ($env:RUNNER_OS -ne 'Windows') {
            & chmod +x $binaryPath
          }
          Write-Host "Verified executable: $binaryPath ($($item.Length) bytes)"

      - name: Package executable artifact
        shell: pwsh
        run: |
          $artifactBase = "$env:APP_NAME-$env:VERSION-${{ matrix.platform }}-x64"
          $stagingRoot = Join-Path $PWD "release-staging"
          $assetRoot = Join-Path $PWD "release-assets"
          $stagingDir = Join-Path $stagingRoot $artifactBase

          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          New-Item -ItemType Directory -Path $assetRoot -Force | Out-Null

          Copy-Item (Join-Path "dist" "${{ matrix.executable_name }}") $stagingDir

          if ($env:RUNNER_OS -eq 'Windows') {
            $archivePath = Join-Path $assetRoot "$artifactBase.zip"
            Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $archivePath -Force
          } else {
            $archivePath = Join-Path $assetRoot "$artifactBase.tar.gz"
            & tar -czf $archivePath -C $stagingRoot $artifactBase
          }

          Write-Host "Packaged artifact: $archivePath"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION }}-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release with executable assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*

