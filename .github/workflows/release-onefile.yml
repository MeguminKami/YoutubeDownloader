name: Release One-File EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-onefile:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install FFmpeg
        shell: powershell
        run: |
          choco install ffmpeg -y --no-progress
          $ffmpegPath = (where.exe ffmpeg | Select-Object -First 1).Trim()
          $ffprobePath = (where.exe ffprobe | Select-Object -First 1).Trim()
          if (-not $ffmpegPath -or -not $ffprobePath) {
            throw "ffmpeg/ffprobe not found after installation"
          }
          "FFMPEG_EXE=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FFPROBE_EXE=$ffprobePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build one-file executable (PyInstaller spec)
        shell: cmd
        run: |
          pyinstaller --clean --noconfirm YoutubeGrab.spec

      - name: Verify build output
        shell: cmd
        run: |
          if not exist dist\YoutubeGrab.exe (
            echo Missing dist\YoutubeGrab.exe
            exit /b 1
          )

      - name: Package release artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist\YoutubeGrab.exe -DestinationPath release\YoutubeGrab-windows-onefile.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YoutubeGrab-windows-onefile
          path: release\YoutubeGrab-windows-onefile.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release\YoutubeGrab-windows-onefile.zip
          generate_release_notes: true

